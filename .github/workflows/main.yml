name: Generate Datas
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Step 1: Essential to prevent "Build dir does not exist"
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate the snake animation
      - name: Generate snake animation
        uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: Af0ns0836
          # Reverted to your specific version's requirements:
          svg_out_path: dist/github-contribution-grid-snake.svg
          gif_out_path: dist/github-contribution-grid-snake.gif

      # Step 3: Deploy the generated folder
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4 # Updated for Node.js 24 compatibility
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
