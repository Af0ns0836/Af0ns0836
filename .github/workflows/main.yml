name: Generate Datas
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Snake Animation
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Af0ns0836
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Stats Card (Base Info)
      - name: Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          filename: ./stats-card.svg  # Added ./ to force it into the local workspace root
          output_action: none
          config_output: flat
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Af0ns0836
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon

      # 3. Languages Card (No Header, just the Language data)
      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: ./languages-card.svg
          user: Af0ns0836
          base: "" # Removed header to create a standalone card
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_output: flat
          output_action: none

      # 4. Debug and Deploy
      - name: Prepare distribution
        run: |
          mkdir -p dist
          # Move the files if they exist, or print a debug message
          mv stats-card.svg dist/ || echo "stats-card.svg not found"
          mv languages-card.svg dist/ || echo "languages-card.svg not found"
          ls -R dist/

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
