name: Generate Datas
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Generate the Snake Animation
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Af0ns0836
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Generate Detailed Metrics
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          user: Af0ns0836
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          # The fix: This combination forces the file to be saved in the root
          config_output: flat
          output_action: none

      # Step 3: Move metrics to the distribution folder
      - name: Prepare distribution
        run: |
          mkdir -p dist
          # If the file exists in root, move it. If not, we list files to debug.
          ls -R
          mv github-metrics.svg dist/ || echo "File not found in root, checking subdirectories..."

      # Step 4: Deploy everything to the 'output' branch
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
