name: Generate Datas
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. The Snake Animation
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Af0ns0836
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. The "Stats Card" (mimics your reference image 88dc7c)
      - name: Generate Stats Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: stats-card.svg
          user: Af0ns0836
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon
          config_output: flat
          output_action: none

      # 3. The "Languages Card" (mimics your reference image 88d99d)
      - name: Generate Languages Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: languages-card.svg
          user: Af0ns0836
          template: classic
          base: "" # This hides the header so it's just the languages
          plugin_languages: yes
          plugin_languages_type: percentage
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_output: flat
          output_action: none

      # 4. Bundle everything into the output branch
      - name: Prepare distribution
        run: |
          mkdir -p dist
          mv stats-card.svg dist/ || echo "Stats missing"
          mv languages-card.svg dist/ || echo "Langs missing"

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
